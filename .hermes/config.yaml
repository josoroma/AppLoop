dashboard:
  theme: mono
command_allowlist:
  - recursive delete
_config_version: 33
platforms:
  api_server:
    enabled: true
    extra:
      model_routes:
        deepseek/deepseek-v4-pro:
          model: deepseek/deepseek-v4-pro
          provider: openrouter
model:
  default: deepseek/deepseek-v4-pro
  provider: openrouter
  base_url: https://openrouter.ai/api/v1
