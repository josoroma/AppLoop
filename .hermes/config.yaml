model:
  default: x-ai/grok-4.5
  provider: openrouter
  base_url: https://openrouter.ai/api/v1
agent:
  service_tier: normal
dashboard:
  theme: mono
command_allowlist:
  - execute_code
  - script execution via -e/-c flag
  - recursive delete
  - script execution via heredoc
_config_version: 33
platforms:
  api_server:
    enabled: true
    extra:
      model_routes:
        deepseek/deepseek-v4-pro:
          model: deepseek/deepseek-v4-pro
          provider: openrouter
